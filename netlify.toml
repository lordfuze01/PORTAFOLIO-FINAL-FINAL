# Sitio 100% estatico (HTML + CSS + JS). No necesita build.
[build]
  publish = "."

# Cabeceras: cachear las librerias y la foto (mejora la velocidad).
[[headers]]
  for = "/lib/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/foto-portada.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
